name: Feature request
description: Suggest an idea for the roadmap
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be added or changed?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add screenshots, examples, or alternatives if useful.
