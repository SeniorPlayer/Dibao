name: Build JS Bundle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ========== 核心构建 ==========
      - name: Build packages
        run: bun run build
        env:
          NODE_ENV: production
          # 如果构建需要其他环境变量（如 DIBAO_SENTRY_CONFIG），请通过 GitHub Secrets 传入
          # DIBAO_SENTRY_CONFIG: ${{ secrets.SENTRY_CONFIG }}

      # ========== 关键诊断：列出构建产物 ==========
      - name: List build outputs
        run: |
          echo "===== apps/server/dist ====="
          ls -la apps/server/dist || echo "⚠️ apps/server/dist 不存在！"
          echo "===== apps/web/dist ====="
          ls -la apps/web/dist || echo "⚠️ apps/web/dist 不存在！"
          echo "===== 整个 apps 目录结构 ====="
          find apps -type f -name "*.js" | head -20

      # ========== 如果产物缺失，让 job 失败 ==========
      - name: Fail if build outputs missing
        run: |
          if [ ! -d "apps/server/dist" ] || [ ! -d "apps/web/dist" ]; then
            echo "❌ 构建产物缺失！请检查 build 脚本。"
            exit 1
          fi
          echo "✅ 构建产物存在。"

      # ========== 清理不必要的文件（减小 artifact） ==========
      - name: Cleanup unnecessary files
        run: |
          rm -rf node_modules .git .github
          # 可选：删除测试、日志等
          # find . -name "*.test.js" -delete

      # ========== 上传整个目录（此时包含 dist） ==========
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dibao-build
          path: ./